<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#FAF7F2" />
    <meta name="description" content="Reflections - Your private writing space" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="light-content" />
    <meta name="apple-mobile-web-app-title" content="Reflections" />
    <title>Reflections</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Georgia', 'Garamond', serif;
            background: #FAF7F2;
            color: #2C2416;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }
        
        #root {
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { X, Search, Plus, ArrowLeft, Lock } = {
            X: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
            Search: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
            Plus: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
            ArrowLeft: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
            Lock: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>,
        };

        function ReflectionApp() {
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [writings, setWritings] = useState([]);
            const [view, setView] = useState('home');
            const [currentWriting, setCurrentWriting] = useState(null);
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedTags, setSelectedTags] = useState([]);
            const [loading, setLoading] = useState(false);
            const [isBiometricAvailable, setIsBiometricAvailable] = useState(false);
            const [apiKey, setApiKey] = useState('');

            useEffect(() => {
                checkBiometricAvailability();
                loadWritings();
                loadApiKey();
            }, []);

            const checkBiometricAvailability = async () => {
                if (window.PublicKeyCredential) {
                    try {
                        const available = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
                        setIsBiometricAvailable(available);
                    } catch (e) {
                        console.log('Biometric check failed:', e);
                    }
                }
            };

            const loadWritings = () => {
                try {
                    const saved = localStorage.getItem('reflections_writings');
                    if (saved) {
                        setWritings(JSON.parse(saved));
                    }
                } catch (e) {
                    console.error('Failed to load writings:', e);
                }
            };

            const loadApiKey = () => {
                try {
                    const saved = localStorage.getItem('reflections_api_key');
                    if (saved) {
                        setApiKey(saved);
                    }
                } catch (e) {
                    console.error('Failed to load API key:', e);
                }
            };

            const saveWritings = (newWritings) => {
                try {
                    localStorage.setItem('reflections_writings', JSON.stringify(newWritings));
                } catch (e) {
                    console.error('Failed to save writings:', e);
                    alert('Storage full. Try clearing some old writings.');
                }
            };

            const saveApiKey = (key) => {
                try {
                    localStorage.setItem('reflections_api_key', key);
                    setApiKey(key);
                } catch (e) {
                    console.error('Failed to save API key:', e);
                }
            };

            const handleNewWriting = async (title, content, imageBase64) => {
                setLoading(true);
                try {
                    if (!apiKey) {
                        alert('Please set your Claude API key first');
                        setLoading(false);
                        return;
                    }

                    const response = await fetch("https://api.anthropic.com/v1/messages", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json",
                            "x-api-key": apiKey,
                            "anthropic-version": "2023-06-01",
                            "anthropic-dangerous-direct-browser-access": "true"
                        },
                        body: JSON.stringify({
                            model: "claude-sonnet-4-6",
                            max_tokens: 200,
                            messages: [
                                {
                                    role: "user",
                                    content: `Based on this text, generate 4-6 creative, punchy tags in the style of the writer. Tags should be personality-filled, subjective, and match the tone. Use hyphens in multi-word tags. Be witty and specific.

Text: "${content}"

Return ONLY the tags as a comma-separated list, nothing else. Example: "brain-worms, 3am-thoughts, philosophical-spiral"`
                                }
                            ],
                        })
                    });

                    const data = await response.json();
                    let tags = ['untagged'];
                    
                    if (data.content && data.content[0] && data.content[0].text) {
                        const tagsText = data.content[0].text;
                        tags = tagsText.split(',').map(tag => tag.trim()).filter(t => t);
                    }

                    const newWriting = {
                        id: Date.now(),
                        title,
                        content,
                        tags,
                        image: imageBase64,
                        createdAt: new Date().toISOString(),
                    };

                    const updated = [newWriting, ...writings];
                    setWritings(updated);
                    saveWritings(updated);
                    setView('home');
                } catch (error) {
                    console.error('Error generating tags:', error);
                    alert('Error generating tags. Check your API key. Tags will be set to "untagged".');
                    
                    const newWriting = {
                        id: Date.now(),
                        title,
                        content,
                        tags: ['untagged'],
                        image: imageBase64,
                        createdAt: new Date().toISOString(),
                    };
                    const updated = [newWriting, ...writings];
                    setWritings(updated);
                    saveWritings(updated);
                    setView('home');
                }
                setLoading(false);
            };

            const allTags = [...new Set(writings.flatMap(w => w.tags))];

            const filteredWritings = writings.filter(writing => {
                const matchesSearch = writing.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                                     writing.content.toLowerCase().includes(searchQuery.toLowerCase());
                const matchesTags = selectedTags.length === 0 || 
                                   selectedTags.some(tag => writing.tags.includes(tag));
                return matchesSearch && matchesTags;
            });

            if (!isAuthenticated) {
                return (
                    <AuthScreen 
                        onAuthenticate={() => setIsAuthenticated(true)}
                        isBiometricAvailable={isBiometricAvailable}
                    />
                );
            }

            return (
                <div style={styles.container}>
                    {view === 'home' && (
                        <HomeView 
                            writings={filteredWritings} 
                            setView={setView} 
                            setCurrentWriting={setCurrentWriting}
                            searchQuery={searchQuery} 
                            setSearchQuery={setSearchQuery} 
                            selectedTags={selectedTags} 
                            setSelectedTags={setSelectedTags} 
                            allTags={allTags}
                            onLogout={() => setIsAuthenticated(false)}
                            apiKey={apiKey}
                            onApiKeyChange={saveApiKey}
                        />
                    )}
                    {view === 'write' && (
                        <WriteView 
                            onSave={handleNewWriting} 
                            setView={setView} 
                            loading={loading} 
                        />
                    )}
                    {view === 'view' && (
                        <ViewWriting 
                            writing={currentWriting} 
                            setView={setView}
                            onDelete={() => {
                                const updated = writings.filter(w => w.id !== currentWriting.id);
                                setWritings(updated);
                                saveWritings(updated);
                                setView('home');
                            }}
                        />
                    )}
                </div>
            );
        }

        function AuthScreen({ onAuthenticate, isBiometricAvailable }) {
            const handleBiometric = async () => {
                try {
                    const credential = await navigator.credentials.get({
                        publicKey: {
                            challenge: new Uint8Array(32),
                            timeout: 60000,
                            userVerification: "preferred",
                        },
                    });
                    if (credential) {
                        onAuthenticate();
                    }
                } catch (error) {
                    console.log('Biometric auth failed:', error);
                }
            };

            return (
                <div style={styles.authContainer}>
                    <div style={styles.authContent}>
                        <h1 style={styles.authTitle}>Reflections</h1>
                        <p style={styles.authSubtitle}>your private space</p>
                        <p style={styles.authDesc}>
                            Welcome. This is your personal journal, protected just for you.
                        </p>
                        {isBiometricAvailable ? (
                            <button onClick={handleBiometric} style={styles.authButton}>
                                <Lock size={20} style={{marginRight: '8px'}} /> Unlock with Face ID
                            </button>
                        ) : (
                            <button onClick={onAuthenticate} style={styles.authButton}>
                                Enter
                            </button>
                        )}
                    </div>
                </div>
            );
        }

        function HomeView({ writings, setView, setCurrentWriting, searchQuery, setSearchQuery, selectedTags, setSelectedTags, allTags, onLogout, apiKey, onApiKeyChange }) {
            const [showApiKeyInput, setShowApiKeyInput] = useState(false);
            const [tempApiKey, setTempApiKey] = useState(apiKey);

            const handleSaveApiKey = () => {
                if (tempApiKey.trim()) {
                    onApiKeyChange(tempApiKey);
                    setShowApiKeyInput(false);
                }
            };

            return (
                <div style={styles.page}>
                    <div style={styles.headerWithLogout}>
                        <div style={styles.header}>
                            <h1 style={styles.title}>Reflections</h1>
                            <p style={styles.subtitle}>your thoughts, unfiltered</p>
                        </div>
                        <div style={{display: 'flex', gap: '8px', flexDirection: 'column'}}>
                            <button onClick={() => setShowApiKeyInput(!showApiKeyInput)} style={styles.smallButton}>
                                {apiKey ? '✓ API Key' : '⚠ Set API Key'}
                            </button>
                            <button onClick={onLogout} style={styles.logoutButton}>Logout</button>
                        </div>
                    </div>

                    {showApiKeyInput && (
                        <div style={styles.apiKeyBox}>
                            <p style={{fontSize: '12px', color: '#8B7355', marginBottom: '8px'}}>
                                Get your key from <a href="https://console.anthropic.com/api/keys" target="_blank" style={{color: '#C4A57B'}}>console.anthropic.com</a>
                            </p>
                            <input
                                type="password"
                                placeholder="sk-ant-..."
                                value={tempApiKey}
                                onChange={(e) => setTempApiKey(e.target.value)}
                                style={styles.apiKeyInput}
                            />
                            <button onClick={handleSaveApiKey} style={styles.saveApiKeyButton}>Save API Key</button>
                        </div>
                    )}

                    <button onClick={() => setView('write')} style={styles.newButton}>
                        <Plus size={20} /> New reflection
                    </button>

                    <div style={styles.searchSection}>
                        <div style={styles.searchBox}>
                            <Search size={18} style={{ color: '#8B7355' }} />
                            <input
                                type="text"
                                placeholder="Search writings..."
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                                style={styles.searchInput}
                            />
                        </div>
                    </div>

                    {allTags.length > 0 && (
                        <div style={styles.tagFilter}>
                            <p style={styles.filterLabel}>Filter by tags</p>
                            <div style={styles.tagList}>
                                {allTags.map(tag => (
                                    <button
                                        key={tag}
                                        onClick={() => setSelectedTags(prev => 
                                            prev.includes(tag) ? prev.filter(t => t !== tag) : [...prev, tag]
                                        )}
                                        style={{
                                            ...styles.tagButton,
                                            ...(selectedTags.includes(tag) ? styles.tagButtonActive : {})
                                        }}
                                    >
                                        {tag}
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    <div style={styles.writings}>
                        {writings.length === 0 ? (
                            <p style={styles.empty}>No reflections yet. Start writing to begin.</p>
                        ) : (
                            writings.map(writing => (
                                <div
                                    key={writing.id}
                                    onClick={() => { setCurrentWriting(writing); setView('view'); }}
                                    style={styles.writingCard}
                                >
                                    {writing.image && (
                                        <img src={writing.image} alt="" style={styles.cardImage} />
                                    )}
                                    <h3 style={styles.cardTitle}>{writing.title}</h3>
                                    <p style={styles.cardPreview}>{writing.content.slice(0, 100)}...</p>
                                    <div style={styles.cardTags}>
                                        {writing.tags.map(tag => (
                                            <span key={tag} style={styles.cardTag}>{tag}</span>
                                        ))}
                                    </div>
                                    <p style={styles.cardDate}>{new Date(writing.createdAt).toLocaleDateString()}</p>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        }

        function WriteView({ onSave, setView, loading }) {
            const [title, setTitle] = useState('');
            const [content, setContent] = useState('');
            const [imageBase64, setImageBase64] = useState(null);
            const fileInputRef = useRef(null);

            const handleImageChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    if (file.size > 5 * 1024 * 1024) {
                        alert('Image too large. Please choose a smaller image.');
                        return;
                    }
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        setImageBase64(event.target.result);
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (title.trim() && content.trim()) {
                    onSave(title, content, imageBase64);
                    setTitle('');
                    setContent('');
                    setImageBase64(null);
                }
            };

            return (
                <div style={styles.page}>
                    <div style={styles.writeHeader}>
                        <button onClick={() => setView('home')} style={styles.backButton}>
                            <ArrowLeft size={20} />
                        </button>
                        <h2 style={styles.writeTitle}>New Reflection</h2>
                    </div>

                    <form onSubmit={handleSubmit} style={styles.form}>
                        <input
                            type="text"
                            placeholder="Title"
                            value={title}
                            onChange={(e) => setTitle(e.target.value)}
                            style={styles.titleInput}
                            required
                            autoFocus
                        />

                        <textarea
                            placeholder="Write your thoughts, stories, recommendations, observations..."
                            value={content}
                            onChange={(e) => setContent(e.target.value)}
                            style={styles.contentInput}
                            required
                        />

                        {imageBase64 && (
                            <div style={styles.imagePreview}>
                                <img src={imageBase64} alt="preview" style={{ maxWidth: '100%', borderRadius: '4px' }} />
                                <button
                                    type="button"
                                    onClick={() => setImageBase64(null)}
                                    style={styles.removeImageButton}
                                >
                                    <X size={16} /> Remove
                                </button>
                            </div>
                        )}

                        <button
                            type="button"
                            onClick={() => fileInputRef.current?.click()}
                            style={styles.imageButton}
                        >
                            + Add image
                        </button>
                        <input
                            ref={fileInputRef}
                            type="file"
                            accept="image/*"
                            onChange={handleImageChange}
                            style={{ display: 'none' }}
                        />

                        <button
                            type="submit"
                            disabled={loading}
                            style={{...styles.submitButton, opacity: loading ? 0.7 : 1}}
                        >
                            {loading ? 'Generating tags...' : 'Save & Tag'}
                        </button>
                    </form>
                </div>
            );
        }

        function ViewWriting({ writing, setView, onDelete }) {
            return (
                <div style={styles.page}>
                    <div style={styles.viewHeader}>
                        <button onClick={() => setView('home')} style={styles.backButton}>
                            <ArrowLeft size={20} />
                        </button>
                        <button onClick={onDelete} style={styles.deleteButton}>
                            <X size={20} />
                        </button>
                    </div>

                    <div style={styles.viewContent}>
                        <h2 style={styles.viewTitle}>{writing.title}</h2>
                        <p style={styles.viewDate}>{new Date(writing.createdAt).toLocaleDateString()}</p>

                        {writing.image && (
                            <img src={writing.image} alt="" style={styles.viewImage} />
                        )}

                        <p style={styles.viewText}>{writing.content}</p>

                        <div style={styles.viewTags}>
                            {writing.tags.map(tag => (
                                <span key={tag} style={styles.viewTag}>{tag}</span>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

            container: {
                width: '100%',
                minHeight: '100vh',
                background: '#FAF7F2',
                fontFamily: "'Georgia', 'Garamond', serif",
                color: '#2C2416',
            },
            authContainer: {
                width: '100%',
                height: '100vh',
                background: '#FAF7F2',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                fontFamily: "'Georgia', 'Garamond', serif",
                color: '#2C2416',
            },
            authContent: {
                width: '100%',
                maxWidth: '320px',
                padding: '40px 20px',
                textAlign: 'center',
            },
            authTitle: {
                fontSize: '40px',

                margin: '0 0 8px 0',

            },
            authSubtitle: {

                fontStyle: 'italic',
            },
            authDesc: {
                fontSize: '14px',
                color: '#6B5F4F',
                marginBottom: '24px',
                lineHeight: '1.6',
            },
            authButton: {
                width: '100%',
                padding: '14px 16px',
                backgroundColor: '#C4A57B',
                border: 'none',
                borderRadius: '2px',
                color: 'white',
                fontSize: '16px',
                fontFamily: "'Georgia', serif",
                cursor: 'pointer',
                marginBottom: '12px',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
            },
            pinInput: {
                width: '100%',
                fontSize: '32px',
                padding: '16px',
                border: '1px solid #D4CCBF',
                borderRadius: '2px',
                textAlign: 'center',
                letterSpacing: '8px',
                marginBottom: '24px',
                fontFamily: 'monospace',
                outline: 'none',
            },
            page: {
                width: '100%',
                minHeight: '100vh',
                overflowY: 'auto',
                padding: '20px',
                paddingBottom: '40px',
            },
            headerWithLogout: {
                display: 'flex',
                justifyContent: 'space-between',
                alignItems: 'flex-start',
                marginBottom: '32px',
                gap: '16px',
            },
            header: {

            },

                background: 'none',

            },

                background: 'none',
                border: 'none',

                padding: '0',

            },
            apiKeyBox: {
